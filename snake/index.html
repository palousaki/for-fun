<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #faf7f4;
        color: #2c2416;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 1rem;
      }

      h1 {
        font-size: 1.6rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #2c2416;
      }

      .scoreboard {
        display: flex;
        gap: 2.5rem;
        font-size: 0.95rem;
        color: #7c6f62;
      }

      .scoreboard span {
        color: #c2692a;
        font-weight: 600;
      }

      canvas {
        display: block;
        border: 2px solid #e8ddd4;
        border-radius: 4px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      }

      .instructions {
        font-size: 0.85rem;
        color: #7c6f62;
        text-align: center;
      }

      .back {
        font-size: 0.85rem;
        color: #7c6f62;
        text-decoration: none;
        margin-top: 0.5rem;
        transition: color 0.15s;
      }

      .back:hover {
        color: #2c2416;
      }
    </style>
  </head>
  <body>
    <h1>Snake</h1>

    <div class="scoreboard">
      Score: <span id="score">0</span>
      &nbsp;&nbsp;Best: <span id="best">0</span>
    </div>

    <canvas id="gameCanvas" width="600" height="600"></canvas>
    <p class="instructions">Arrow keys or WASD to move &nbsp;·&nbsp; Press Space to start / restart</p>
    <a class="back" href="../">← Back to games</a>

    <script>
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');

      const COLS = 20;
      const ROWS = 20;
      const CELL = canvas.width / COLS;

      const COLORS = {
        bg: '#1a1a2e',
        grid: '#1f1f3a',
        snake: '#6bd06b',
        snakeHead: '#9ef09e',
        food: '#e2a96b',
        text: '#ffffff',
        muted: '#888',
      };

      let snake, dir, nextDir, food, score, best, gameState, interval;
      best = 0;

      function init() {
        snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
        dir = { x: 1, y: 0 };
        nextDir = { x: 1, y: 0 };
        score = 0;
        updateScore();
        spawnFood();
        gameState = 'waiting';
        draw();
      }

      function startGame() {
        if (interval) clearInterval(interval);
        gameState = 'running';
        interval = setInterval(tick, 120);
      }

      function tick() {
        dir = nextDir;
        const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

        // Wall collision
        if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
          endGame();
          return;
        }

        // Self collision
        if (snake.some(s => s.x === head.x && s.y === head.y)) {
          endGame();
          return;
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
          score++;
          updateScore();
          spawnFood();
        } else {
          snake.pop();
        }

        draw();
      }

      function endGame() {
        clearInterval(interval);
        gameState = 'over';
        if (score > best) best = score;
        document.getElementById('best').textContent = best;
        draw();
      }

      function spawnFood() {
        let pos;
        do {
          pos = {
            x: Math.floor(Math.random() * COLS),
            y: Math.floor(Math.random() * ROWS),
          };
        } while (snake.some(s => s.x === pos.x && s.y === pos.y));
        food = pos;
      }

      function updateScore() {
        document.getElementById('score').textContent = score;
      }

      function draw() {
        // Background
        ctx.fillStyle = COLORS.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Grid
        ctx.strokeStyle = COLORS.grid;
        ctx.lineWidth = 0.5;
        for (let x = 0; x <= COLS; x++) {
          ctx.beginPath();
          ctx.moveTo(x * CELL, 0);
          ctx.lineTo(x * CELL, canvas.height);
          ctx.stroke();
        }
        for (let y = 0; y <= ROWS; y++) {
          ctx.beginPath();
          ctx.moveTo(0, y * CELL);
          ctx.lineTo(canvas.width, y * CELL);
          ctx.stroke();
        }

        // Food
        ctx.fillStyle = COLORS.food;
        ctx.beginPath();
        ctx.arc(
          food.x * CELL + CELL / 2,
          food.y * CELL + CELL / 2,
          CELL / 2 - 3,
          0, Math.PI * 2
        );
        ctx.fill();

        // Snake
        snake.forEach((seg, i) => {
          ctx.fillStyle = i === 0 ? COLORS.snakeHead : COLORS.snake;
          ctx.beginPath();
          ctx.roundRect(
            seg.x * CELL + 2,
            seg.y * CELL + 2,
            CELL - 4,
            CELL - 4,
            4
          );
          ctx.fill();
        });

        // Overlays
        if (gameState === 'waiting') {
          drawOverlay('Snake', 'Press Space to start');
        } else if (gameState === 'over') {
          drawOverlay('Game Over', `Score: ${score} — Press Space to restart`);
        }
      }

      function drawOverlay(title, subtitle) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.textAlign = 'center';
        ctx.fillStyle = COLORS.text;
        ctx.font = 'bold 48px sans-serif';
        ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 20);

        ctx.font = '18px sans-serif';
        ctx.fillStyle = COLORS.muted;
        ctx.fillText(subtitle, canvas.width / 2, canvas.height / 2 + 24);
      }

      document.addEventListener('keydown', e => {
        switch (e.key) {
          case 'ArrowUp':    case 'w': case 'W':
            if (dir.y === 0) nextDir = { x: 0, y: -1 }; break;
          case 'ArrowDown':  case 's': case 'S':
            if (dir.y === 0) nextDir = { x: 0, y: 1 };  break;
          case 'ArrowLeft':  case 'a': case 'A':
            if (dir.x === 0) nextDir = { x: -1, y: 0 }; break;
          case 'ArrowRight': case 'd': case 'D':
            if (dir.x === 0) nextDir = { x: 1, y: 0 };  break;
          case ' ':
            e.preventDefault();
            if (gameState === 'waiting' || gameState === 'over') {
              init();
              startGame();
            }
            break;
        }
      });

      init();
    </script>
  </body>
</html>
