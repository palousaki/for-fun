<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pong</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #faf7f4;
        color: #2c2416;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 1rem;
      }

      h1 {
        font-size: 1.6rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #2c2416;
      }

      canvas {
        display: block;
        border: 2px solid #e8ddd4;
        border-radius: 4px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      }

      .instructions {
        font-size: 0.85rem;
        color: #7c6f62;
        text-align: center;
      }

      .back {
        font-size: 0.85rem;
        color: #7c6f62;
        text-decoration: none;
        margin-top: 0.5rem;
        transition: color 0.15s;
      }

      .back:hover {
        color: #2c2416;
      }
    </style>
  </head>
  <body>
    <h1>Pong</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <p class="instructions">Move your mouse to control the left paddle &nbsp;·&nbsp; First to 5 wins</p>
    <a class="back" href="../">← Back to games</a>

    <script>
      var canvas;
      var canvasContext;
      var ballX = 50;
      var ballY = 50;
      var ballSpeedX = 10;
      var ballSpeedY = 4;

      var paddle1Y = 250;
      const PADDLE_HEIGHT = 100;
      const PADDLE_THICKNESS = 10;
      var paddle2Y = 250;

      var player1Score = 0;
      var player2Score = 0;
      const WINNING_SCORE = 5;

      var showingWinScreen = false;

      function calculateMousePos(evt) {
        var rect = canvas.getBoundingClientRect();
        var root = document.documentElement;
        var mouseX = evt.clientX - rect.left - root.scrollLeft;
        var mouseY = evt.clientY - rect.top - root.scrollTop;
        return { x: mouseX, y: mouseY };
      }

      function handleMouseClick(evt) {
        if (showingWinScreen) {
          player1Score = 0;
          player2Score = 0;
          showingWinScreen = false;
        }
      }

      window.onload = function () {
        canvas = document.getElementById('gameCanvas');
        canvasContext = canvas.getContext('2d');

        var framesPerSecond = 30;
        setInterval(function () {
          moveEverything();
          drawEverything();
        }, 1000 / framesPerSecond);

        canvas.addEventListener('mousedown', handleMouseClick);
        canvas.addEventListener('mousemove', function (evt) {
          var mousePos = calculateMousePos(evt);
          paddle1Y = mousePos.y - PADDLE_HEIGHT / 2;
        });
      };

      function ballReset() {
        if (player1Score >= WINNING_SCORE || player2Score >= WINNING_SCORE) {
          showingWinScreen = true;
        }
        ballSpeedX = -ballSpeedX;
        ballX = canvas.width / 2;
        ballY = canvas.height / 2;
        ballSpeedY = 4;
      }

      function computerMovement() {
        var paddle2YCenter = paddle2Y + PADDLE_HEIGHT / 2;
        if (paddle2YCenter < ballY - 35) {
          paddle2Y += 6;
        } else if (paddle2YCenter > ballY + 35) {
          paddle2Y -= 6;
        }
      }

      function moveEverything() {
        if (showingWinScreen) return;

        computerMovement();
        ballX += ballSpeedX;
        ballY += ballSpeedY;

        if (ballX > canvas.width) {
          if (ballY > paddle2Y && ballY < paddle2Y + PADDLE_HEIGHT) {
            ballSpeedX = -ballSpeedX;
            var deltaY = ballY - (paddle2Y + PADDLE_HEIGHT / 2);
            ballSpeedY = deltaY * 0.35;
          } else {
            player1Score++;
            ballReset();
          }
        }
        if (ballX < 0) {
          if (ballY > paddle1Y && ballY < paddle1Y + PADDLE_HEIGHT) {
            ballSpeedX = -ballSpeedX;
            var deltaY = ballY - (paddle1Y + PADDLE_HEIGHT / 2);
            ballSpeedY = deltaY * 0.35;
          } else {
            player2Score++;
            ballReset();
          }
        }
        if (ballY > canvas.height) ballSpeedY = -ballSpeedY;
        if (ballY < 0) ballSpeedY = -ballSpeedY;
      }

      function drawEverything() {
        colorRect(0, 0, canvas.width, canvas.height, '#1a1a2e');

        canvasContext.setLineDash([10, 10]);
        canvasContext.strokeStyle = '#333';
        canvasContext.lineWidth = 2;
        canvasContext.beginPath();
        canvasContext.moveTo(canvas.width / 2, 0);
        canvasContext.lineTo(canvas.width / 2, canvas.height);
        canvasContext.stroke();
        canvasContext.setLineDash([]);

        if (showingWinScreen) {
          canvasContext.fillStyle = '#fff';
          canvasContext.font = 'bold 48px sans-serif';
          canvasContext.textAlign = 'center';
          canvasContext.fillText(
            player1Score >= WINNING_SCORE ? 'You win!' : 'Computer wins!',
            canvas.width / 2,
            canvas.height / 2 - 20
          );
          canvasContext.font = '20px sans-serif';
          canvasContext.fillStyle = '#aaa';
          canvasContext.fillText('Click to play again', canvas.width / 2, canvas.height / 2 + 30);
          return;
        }

        canvasContext.fillStyle = '#fff';
        canvasContext.font = 'bold 32px sans-serif';
        canvasContext.textAlign = 'center';
        canvasContext.fillText(player1Score, canvas.width / 4, 60);
        canvasContext.fillText(player2Score, (canvas.width * 3) / 4, 60);

        colorRect(0, paddle1Y, PADDLE_THICKNESS, PADDLE_HEIGHT, '#e2a96b');
        colorRect(canvas.width - PADDLE_THICKNESS, paddle2Y, PADDLE_THICKNESS, PADDLE_HEIGHT, '#6b9fe2');

        colorCircle(ballX, ballY, 10, '#fff');
      }

      function colorCircle(centerX, centerY, radius, drawColor) {
        canvasContext.fillStyle = drawColor;
        canvasContext.beginPath();
        canvasContext.arc(centerX, centerY, radius, 0, Math.PI * 2, true);
        canvasContext.fill();
      }

      function colorRect(leftX, topY, width, height, drawColor) {
        canvasContext.fillStyle = drawColor;
        canvasContext.fillRect(leftX, topY, width, height);
      }
    </script>
  </body>
</html>
