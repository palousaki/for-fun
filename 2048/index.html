<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2048</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔢</text></svg>" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #faf7f4;
        color: #2c2416;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 1rem;
        padding: 2rem 1rem;
      }

      h1 {
        font-size: 1.6rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      .scoreboard {
        display: flex;
        gap: 1rem;
      }

      .score-box {
        background: #e8ddd4;
        border-radius: 6px;
        padding: 0.4rem 1rem;
        text-align: center;
        min-width: 80px;
      }

      .score-box .label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #7c6f62;
      }

      .score-box .value {
        font-size: 1.1rem;
        font-weight: 700;
        color: #c2692a;
      }

      .board {
        display: grid;
        grid-template-columns: repeat(4, 100px);
        grid-template-rows: repeat(4, 100px);
        gap: 8px;
        background: #e8ddd4;
        border-radius: 8px;
        padding: 8px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      }

      .cell {
        background: #f0e8e0;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.6rem;
        font-weight: 700;
        transition: background 0.1s, color 0.1s;
      }

      .cell[data-val="2"]    { background: #f5ede3; color: #2c2416; }
      .cell[data-val="4"]    { background: #f0dcc8; color: #2c2416; }
      .cell[data-val="8"]    { background: #e2a96b; color: #fff; }
      .cell[data-val="16"]   { background: #d4895a; color: #fff; }
      .cell[data-val="32"]   { background: #c2692a; color: #fff; }
      .cell[data-val="64"]   { background: #a0501a; color: #fff; }
      .cell[data-val="128"]  { background: #8fb8e8; color: #fff; font-size: 1.3rem; }
      .cell[data-val="256"]  { background: #6b9fe2; color: #fff; font-size: 1.3rem; }
      .cell[data-val="512"]  { background: #4a7fc2; color: #fff; font-size: 1.3rem; }
      .cell[data-val="1024"] { background: #2d5fa0; color: #fff; font-size: 1rem; }
      .cell[data-val="2048"] { background: #1a3d7a; color: #fff; font-size: 1rem; }

      .cell.pop {
        animation: pop 0.15s ease;
      }

      @keyframes pop {
        0%   { transform: scale(1); }
        50%  { transform: scale(1.12); }
        100% { transform: scale(1); }
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(250, 247, 244, 0.85);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        font-size: 1rem;
        color: #2c2416;
      }

      .overlay h2 {
        font-size: 2rem;
      }

      .overlay p {
        color: #7c6f62;
      }

      .btn {
        background: #c2692a;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 0.6rem 1.4rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }

      .btn:hover {
        background: #a0501a;
      }

      .instructions {
        font-size: 0.85rem;
        color: #7c6f62;
        text-align: center;
      }

      .back {
        font-size: 0.85rem;
        color: #7c6f62;
        text-decoration: none;
        transition: color 0.15s;
      }

      .back:hover {
        color: #2c2416;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>2048</h1>

    <div class="scoreboard">
      <div class="score-box">
        <div class="label">Score</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="label">Best</div>
        <div class="value" id="best">0</div>
      </div>
    </div>

    <div class="board" id="board"></div>

    <p class="instructions">Arrow keys or WASD to move tiles &nbsp;·&nbsp; Reach 2048 to win!</p>
    <a class="back" href="../">← Back to games</a>

    <div class="overlay hidden" id="overlay">
      <h2 id="overlay-title"></h2>
      <p id="overlay-sub"></p>
      <button class="btn" id="overlay-btn">Play again</button>
    </div>

    <script>
      let board, score, best;
      best = 0;

      function init() {
        board = Array.from({ length: 4 }, () => Array(4).fill(0));
        score = 0;
        hideOverlay();
        spawnTile();
        spawnTile();
        render();
      }

      function spawnTile() {
        const empty = [];
        for (let r = 0; r < 4; r++)
          for (let c = 0; c < 4; c++)
            if (board[r][c] === 0) empty.push([r, c]);
        if (!empty.length) return;
        const [r, c] = empty[Math.floor(Math.random() * empty.length)];
        board[r][c] = Math.random() < 0.9 ? 2 : 4;
      }

      function slide(row) {
        let arr = row.filter(x => x !== 0);
        for (let i = 0; i < arr.length - 1; i++) {
          if (arr[i] === arr[i + 1]) {
            arr[i] *= 2;
            score += arr[i];
            arr[i + 1] = 0;
          }
        }
        arr = arr.filter(x => x !== 0);
        while (arr.length < 4) arr.push(0);
        return arr;
      }

      function move(dir) {
        const prev = board.map(r => [...r]);
        let moved = false;

        for (let r = 0; r < 4; r++) {
          if (dir === 'left')  board[r] = slide(board[r]);
          if (dir === 'right') board[r] = slide([...board[r]].reverse()).reverse();
        }
        for (let c = 0; c < 4; c++) {
          const col = board.map(r => r[c]);
          const newCol = dir === 'up'   ? slide(col)
                       : dir === 'down' ? slide([...col].reverse()).reverse()
                       : col;
          for (let r = 0; r < 4; r++) board[r][c] = newCol[r];
        }

        for (let r = 0; r < 4; r++)
          for (let c = 0; c < 4; c++)
            if (board[r][c] !== prev[r][c]) moved = true;

        if (moved) {
          spawnTile();
          if (score > best) { best = score; document.getElementById('best').textContent = best; }
          render();
          if (hasWon()) showOverlay('You win! 🎉', 'You reached 2048!');
          else if (isGameOver()) showOverlay('Game over', `Final score: ${score}`);
        }
      }

      function hasWon() {
        return board.some(r => r.includes(2048));
      }

      function isGameOver() {
        for (let r = 0; r < 4; r++)
          for (let c = 0; c < 4; c++) {
            if (board[r][c] === 0) return false;
            if (c < 3 && board[r][c] === board[r][c + 1]) return false;
            if (r < 3 && board[r][c] === board[r + 1][c]) return false;
          }
        return true;
      }

      function render() {
        document.getElementById('score').textContent = score;
        const boardEl = document.getElementById('board');
        boardEl.innerHTML = '';
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            const val = board[r][c];
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (val) {
              cell.textContent = val;
              cell.setAttribute('data-val', val);
              cell.classList.add('pop');
            }
            boardEl.appendChild(cell);
          }
        }
      }

      function showOverlay(title, sub) {
        document.getElementById('overlay-title').textContent = title;
        document.getElementById('overlay-sub').textContent = sub;
        document.getElementById('overlay').classList.remove('hidden');
      }

      function hideOverlay() {
        document.getElementById('overlay').classList.add('hidden');
      }

      document.getElementById('overlay-btn').addEventListener('click', init);

      document.addEventListener('keydown', e => {
        const map = {
          ArrowLeft: 'left', a: 'left', A: 'left',
          ArrowRight: 'right', d: 'right', D: 'right',
          ArrowUp: 'up', w: 'up', W: 'up',
          ArrowDown: 'down', s: 'down', S: 'down',
        };
        if (map[e.key]) {
          e.preventDefault();
          move(map[e.key]);
        }
      });

      // Swipe support for mobile
      let touchStartX, touchStartY;
      document.addEventListener('touchstart', e => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      });
      document.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
        if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
        else move(dy > 0 ? 'down' : 'up');
      });

      init();
    </script>
  </body>
</html>
